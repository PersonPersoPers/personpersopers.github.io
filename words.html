<!DOCTYPE html>
<html>
  <head>
    <title>Word Finder</title>
  </head>
  <body>
    <div style="display: flex; justify-content: center; margin-top: 32px">
      <label>Length: </label><input id="length">
      <label>Required: </label><input id="required">
      <label>Letters: </label><input id="letters">
      <button id="submit">Submit</button>
      <p id="result"></p>
      <script>
        var length = document.getElementById("length")
        var required = document.getElementById("required")
        var letters = document.getElementById("letters")
        var submit = document.getElementById("submit")
        var result = document.getElementById("result")
        var words = ""
        ;(async function(){
          var wpromise = await fetch("https://personpersopers.github.io/words.txt")
          words = await wpromise.text()
        })()
        words = words.split(/\r?\n/)
        submit.onclick = () => {
          for(var w of words){
            var req = required.value
            var ltrs = letters.value
            if(w.includes(req) && w.length >= parseInt(length.value)){
              var valid = true
              for(var c of w){
                if(!ltrs.includes(c)){
                  valid = false
                }
              }
              if(valid){
                result.innerText += w + ", "
              }
            }
          }
        }
      </script>
    </div>
  </body>
</html>
